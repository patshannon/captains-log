name: Nightly Captain's Log

on:
  schedule:
    - cron: "0 3 * * *" # 11 PM AST / 3 AM UTC
  workflow_dispatch:

jobs:
  generate-log:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate log entry
        run: python log.py generate --date $(date -u -d "yesterday" +%Y-%m-%d)
        env:
          PERSONAL_GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_ORGS: "patshannon,bboxdigital,lavitrine"
          GITHUB_USERNAME: "patshannon"

      - name: Commit and push changes
        run: |
          git config user.name "Captain's Log Bot"
          git config user.email "captains-log[bot]@users.noreply.github.com"
          git add logs/
          git diff --staged --quiet || (git commit -m "Captain's Log — $(date -u -d 'yesterday' +%Y-%m-%d)" && git push)
